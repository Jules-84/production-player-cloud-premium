<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#030304">
<title>Production Player Companion</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#030304;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;padding:max(18px,env(safe-area-inset-top)) 16px max(22px,env(safe-area-inset-bottom))}
.wrap{max-width:620px;margin:auto}
h1{text-align:center;color:#ffd15b;font-size:25px;margin:4px 0}
.sub{text-align:center;color:#999;margin-bottom:15px}
.status{width:max-content;margin:0 auto 16px;padding:8px 12px;border-radius:999px;background:#401818;color:#ffaaaa;font-weight:800}
.status.connected{background:#123d25;color:#8dffb0}
.card{background:#0e0e13;border:1px solid #2b2b31;border-radius:18px;padding:18px;margin-bottom:14px}
.label{color:#ffd15b;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.12em}
#production{font-size:20px;font-weight:900;margin-top:6px}
#current{font-size:clamp(32px,10vw,54px);font-weight:900;line-height:1.08;margin-top:12px}
#next{font-size:24px;font-weight:800;margin-top:10px;color:#ddd}
.progressCard{background:#0e0e13;border:1px solid #2b2b31;border-radius:18px;padding:18px;margin-bottom:14px}
.progressTrack{height:12px;border-radius:999px;background:#26262d;overflow:hidden;margin-top:12px}
#progressFill{height:100%;width:0%;background:linear-gradient(90deg,#27dfff,#ab6cff,#ffd15b);transition:width .15s linear}
.timeRow{display:flex;justify-content:space-between;gap:12px;margin-top:9px;color:#bbb;font-variant-numeric:tabular-nums}
.playState{margin-top:8px;color:#ffd15b;font-weight:800}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.controls button{min-height:72px;border-radius:15px;border:1px solid #3a3a42;background:#17171d;color:#fff;font-size:18px;font-weight:900;touch-action:manipulation}
.play{color:#8dffb0!important;border-color:#2f7b4a!important}
.pause{color:#ffd15b!important;border-color:#7a6423!important}
.next{grid-column:1/-1;color:#9fd8ff!important;border-color:#3e6e8f!important}
.stop{grid-column:1/-1;color:#ffaaaa!important;border-color:#7a3333!important;background:#321414!important}
.note{text-align:center;color:#777;font-size:12px;margin-top:15px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Production Player Companion</h1>
  <div class="sub">Secure Cloud Remote</div>
  <div id="status" class="status">Connecting…</div>
  <div class="card"><div class="label">Production</div><div id="production">Production</div></div>
  <div class="card"><div class="label">Current Cue</div><div id="current">Ready</div></div>
  <div class="card"><div class="label">Next Cue</div><div id="next">No next cue</div></div>
  <div class="progressCard">
    <div class="label">Cue Progress</div>
    <div id="playState" class="playState">Stopped</div>
    <div class="progressTrack"><div id="progressFill"></div></div>
    <div class="timeRow"><span id="elapsed">00:00</span><span id="duration">00:00</span></div>
  </div>
  <div class="controls">
    <button class="play" data-action="play">▶ Play</button>
    <button class="pause" data-action="pause">⏸ Pause / Resume</button>
    <button class="next" data-action="next">⏭ Next Cue</button>
    <button class="stop" data-action="stop">■ Stop</button>
  </div>
  <div class="note">Keep the desktop player open while using this remote.</div>
</div>
<script>
(() => {
  const sessionId = location.pathname.split("/").filter(Boolean).pop();
  const status = document.getElementById("status");
  let socket, retry;

  function setStatus(message, connected) {
    status.textContent = message;
    status.classList.toggle("connected", connected);
  }

  function formatTime(value) {
    const seconds = Math.max(0, Math.floor(Number(value || 0)));
    const minutes = Math.floor(seconds / 60);
    const remainder = seconds % 60;
    return String(minutes).padStart(2, "0") + ":" + String(remainder).padStart(2, "0");
  }

  function render(state) {
    document.getElementById("production").textContent = state.productionName || "Production";
    document.getElementById("current").textContent = state.currentCue || "Ready";
    document.getElementById("next").textContent = state.nextCue || "No next cue";
    document.getElementById("progressFill").style.width =
      (Math.max(0, Math.min(1, Number(state.progress || 0))) * 100) + "%";
    document.getElementById("elapsed").textContent = formatTime(state.elapsedSeconds);
    document.getElementById("duration").textContent = formatTime(state.durationSeconds);
    document.getElementById("playState").textContent = state.isPlaying ? "Playing" : "Paused / Stopped";
  }

  function connect() {
    clearTimeout(retry);
    socket = new WebSocket(
      `wss://${location.host}/?role=remote&session=${encodeURIComponent(sessionId)}`
    );

    socket.onopen = () => setStatus("Connected", true);
    socket.onmessage = event => {
      try {
        const message = JSON.parse(event.data);
        if (message.type === "state") render(message.state || {});
        if (message.type === "desktopOffline") setStatus("Waiting for player computer…", false);
        if (message.type === "desktopOnline") setStatus("Connected", true);
      } catch {}
    };
    socket.onclose = () => {
      setStatus("Disconnected — reconnecting…", false);
      retry = setTimeout(connect, 1500);
    };
    socket.onerror = () => socket.close();
  }

  document.querySelectorAll("[data-action]").forEach(button => {
    button.onclick = () => {
      if (socket?.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: "action",
          action: button.dataset.action
        }));
      }
    };
  });

  connect();
})();
</script>
</body>
</html>
